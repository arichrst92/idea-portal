# IDEA Portal — Dev environment
# Run: docker compose up -d
# Stop: docker compose down
# Reset DB: docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: idea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: idea_portal
      POSTGRES_USER: idea
      POSTGRES_PASSWORD: idea_dev_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idea -d idea_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: idea-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: idea-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_dev_pass
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idea-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      # Dev only: hot reload — di-comment di production
      - ./backend:/home/idea/app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idea-celery
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/home/idea/app
    command: celery -A app.celery_app worker --loglevel=info
    # Sprint 4+: aktifkan saat ada Celery task pertama
    profiles: ["full"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: idea-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    profiles: ["full"]
    # Dev: pakai `npm run dev` di host (lebih cepat HMR)
    # docker compose up frontend → hanya untuk preview prod build

volumes:
  postgres_data:
  redis_data:
  minio_data:
