# Nginx reverse proxy untuk production
# Frontend (static) + backend (API) + WebSocket (Celery task progress, future)

upstream idea_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name portal.ide.asia;

    # Frontend (SPA — fallback to index.html)
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://idea_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # API docs (dev/staging only — disable di production)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://idea_backend;
        proxy_set_header Host $host;
    }

    # Healthcheck
    location /health {
        proxy_pass http://idea_backend/health;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;  # untuk upload PDF/foto
}
